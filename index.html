<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolf.Business</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --crimson:#e03d5a;
  --violet:#8b47d9;
  --bg:#080710;
  --text:#f0eaf8;
  --muted:#8a82a0;
  --accent:#c97ef5;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow-x:hidden;
}

/* HERO */
.hero {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1 {
  font-family:'Bebas Neue';
  font-size: clamp(60px, 10vw, 120px);
  background: linear-gradient(270deg,#8b47d9,#e03d5a,#8b47d9);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

@keyframes gradientMove {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.tld {
  display:block;
  font-size:0.4em;
  letter-spacing:3px;
}

/* STATS */
.stats { margin-top:50px; }
.stats-inner { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }

/* ⭐ CARD */
.stat {
  background: #0d0b18;
  padding: 40px 24px;
  border-radius: 18px;
  position: relative;
  overflow: hidden;
  transition: all .3s ease;
  cursor:pointer;
}

/* Glow */
.stat::before {
  content:'';
  position:absolute;
  inset:0;
  background: linear-gradient(120deg, rgba(224,61,90,0.5), rgba(139,71,217,0.5));
  opacity:0;
  transition:.3s;
  filter:blur(25px);
}

.stat:hover::before { opacity:1; }

.stat:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow:0 20px 60px rgba(139,71,217,0.6);
}

/* Content */
.stat-num {
  font-size:40px;
  font-family:'Bebas Neue';
  position:relative;
  z-index:1;
}

.stat-label {
  font-size:14px;
  color:var(--muted);
  position:relative;
  z-index:1;
}

/* BUTTONS */
.cta {
  margin-top:50px;
  display:flex;
  gap:15px;
}

button {
  padding:14px 28px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:600;
}

.primary {
  background:linear-gradient(135deg,#8b47d9,#e03d5a);
  color:#fff;
}

.ghost {
  background:transparent;
  border:1px solid #8b47d9;
  color:#c97ef5;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal.active { display:flex; }

.modal-box {
  background:#111;
  padding:30px;
  border-radius:20px;
  width:300px;
}

input, textarea {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#1a1828;
  border:none;
  color:#fff;
}
</style>
</head>

<body>

<section class="hero">
  <h1>WOLF<span class="tld">.BUSINESS</span></h1>

  <div class="stats">
    <div class="stats-inner">

      <div class="stat"><div class="stat-num" data-target="4">0</div><div class="stat-label">Letters</div></div>
      <div class="stat"><div class="stat-num" data-target="1">0</div><div class="stat-label">Syllable</div></div>
      <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Word</div></div>
      <div class="stat"><div class="stat-num">💡</div><div class="stat-label">Meaning</div></div>

    </div>
  </div>

  <div class="cta">
    <button class="primary" onclick="openModal()">Send Inquiry</button>
    <button class="ghost">Call</button>
  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Contact</h3>
    <input placeholder="Name">
    <input placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button onclick="closeModal()">Send</button>
  </div>
</div>

<script>
function openModal(){ document.getElementById('modal').classList.add('active'); }
function closeModal(){ document.getElementById('modal').classList.remove('active'); }

/* 🔢 Count Up Animation */
document.querySelectorAll('.stat-num').forEach(el=>{
  let target = el.getAttribute('data-target');
  if(!target) return;

  let count = 0;
  let speed = target / 40;

  let interval = setInterval(()=>{
    count += speed;
    if(count >= target){
      el.innerText = target;
      clearInterval(interval);
    } else {
      el.innerText = Math.floor(count);
    }
  },20);
});
</script>

</body>
</html>
