<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolf.Business</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --crimson:#e03d5a; --violet:#8b47d9; --bg:#080710; --text:#f0eaf8; --muted:#8a82a0; --accent:#c97ef5; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow-x:hidden; }

.hero { 
  min-height:100vh; 
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  justify-content:center; 
  text-align:center; 
  padding: clamp(20px, 5vw, 60px);
}

h1 { 
  font-family:'Bebas Neue'; 
  font-size: clamp(60px, 16vw, 180px); 
  line-height:0.9; 
  background: linear-gradient(270deg,#8b47d9,#e03d5a,#8b47d9); 
  background-size:400% 400%; 
  animation: gradientMove 8s ease infinite; 
  -webkit-background-clip:text; 
  -webkit-text-fill-color:transparent; 
  background-clip:text; 
  letter-spacing:4px; 
}
@keyframes gradientMove { 0%{background-position:0%} 50%{background-position:100%} 100%{background-position:0%} }

.tld { display:block; font-size:0.52em; letter-spacing:6px; margin-top:10px; -webkit-text-fill-color:inherit; }

.stats { margin-top:50px; width: 100%; max-width: 1200px; }
.stats-inner { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.stat { 
  flex: 1 1 180px; 
  max-width: 260px; 
  background: #0d0b18; 
  padding: 40px 24px; 
  border-radius: 18px; 
  position: relative; 
  overflow: hidden; 
  transition: all .3s ease; 
  cursor:pointer; 
}
.stat::before { content:''; position:absolute; inset:0; background: linear-gradient(120deg, rgba(224,61,90,0.5), rgba(139,71,217,0.5)); opacity:0; transition:.3s; filter:blur(25px); }
.stat:hover::before { opacity:1; }
.stat:hover { transform: translateY(-8px) scale(1.03); box-shadow:0 20px 60px rgba(139,71,217,0.6); }

.stat-num { font-size: clamp(24px, 5vw, 40px); font-family:'Bebas Neue'; position:relative; z-index:1; }
.stat-label { font-size: clamp(12px, 1.5vw, 14px); color:var(--muted); position:relative; z-index:1; }

.cta { margin-top:50px; display:flex; gap:15px; flex-wrap: wrap; justify-content:center; }
button { padding:14px 28px; border:none; border-radius:50px; cursor:pointer; font-weight:600; }
.primary { background:linear-gradient(135deg,#8b47d9,#e03d5a); color:#fff; }
.ghost { background:transparent; border:1px solid #8b47d9; color:#c97ef5; }

.for-sale {
  margin-top: 24px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-radius: 50px;
  border: 1px solid rgba(201,126,245,0.3);
  background: rgba(139,71,217,0.1);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
}
.for-sale .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 8px #4ade80;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.modal { display:none; position:fixed; inset:0; background: rgba(8,7,16,0.55); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); justify-content:center; align-items:center; z-index:999; }
.modal.active { display:flex; }

.modal-box { 
  background: rgba(255,255,255,0.05); 
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); 
  border: 1px solid rgba(201,126,245,0.25); 
  box-shadow: 0 8px 40px rgba(139,71,217,0.35), inset 0 1px 0 rgba(255,255,255,0.08); 
  padding: clamp(20px, 4vw, 36px); 
  border-radius: 24px; 
  width: min(90vw, 400px); 
  max-width: 100%;
  position: relative; 
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both; 
}
@keyframes popIn { from{opacity:0;transform:scale(.88) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

.modal-box h3 { 
  font-family:'Bebas Neue'; font-size: clamp(22px,5vw,28px); letter-spacing:2px; 
  background:linear-gradient(135deg,#c97ef5,#e03d5a); 
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; 
  margin-bottom:20px; 
}
.modal-close { position:absolute; top:14px; right:18px; background:transparent; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px 8px; border-radius:50%; transition:color .2s,background .2s; }
.modal-close:hover { color:#fff; background:rgba(255,255,255,0.08); }

input, textarea { width:100%; margin-bottom:12px; padding:12px 14px; background:rgba(255,255,255,0.07); border:1px solid rgba(201,126,245,0.2); border-radius:12px; color:#fff; font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s,background .2s; }
input:focus, textarea:focus { border-color:rgba(201,126,245,0.6); background:rgba(255,255,255,0.10); }
input::placeholder, textarea::placeholder { color:var(--muted); }
input.error, textarea.error { border-color:#e03d5a; }
textarea { resize:vertical; min-height:90px; }

.modal-box .send-btn { width:100%; padding:13px; background:linear-gradient(135deg,#8b47d9,#e03d5a); color:#fff; border:none; border-radius:50px; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .2s,transform .15s; margin-top:4px; }
.modal-box .send-btn:hover { opacity:.88; transform:scale(1.02); }
.modal-box .send-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.success-msg { display:none; text-align:center; padding:20px 0; }
.success-msg .check { font-size:52px; margin-bottom:14px; }
.success-msg p { color:var(--accent); font-weight:600; font-size:15px; line-height:1.6; }

@media (max-width: 768px) {
  .stats-inner { gap: 12px; }
  .stat { padding: 24px 16px; border-radius: 14px; }
  .stat-num { font-size: clamp(20px,5vw,30px); }
  .cta { margin-top: 32px; flex-direction: column; align-items: center; gap: 10px; }
  .cta button { width: 100%; max-width: 280px; }
  .modal-box { width: calc(100vw - 32px); padding: 28px 20px; border-radius: 18px; }
  .modal-box h3 { font-size: clamp(20px,5vw,24px); }
  input, textarea { font-size: 16px; }
}

@media (max-width: 480px) {
  .stats-inner { flex-direction: column; align-items: center; }
  .stat { width: 100%; max-width: 260px; }
}
</style>
</head>
<body>
<section class="hero">
  <h1>WOLF<span class="tld">.BUSINESS</span></h1>
  <div class="for-sale"><span class="dot"></span> This Domain Is For Sale</div>
  <div class="stats">
    <div class="stats-inner">
      <div class="stat"><div class="stat-num" data-target="4">0</div><div class="stat-label">Letters</div></div>
      <div class="stat"><div class="stat-num" data-target="1">0</div><div class="stat-label">Syllable</div></div>
      <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Dictionary Word</div></div>
      <div class="stat"><div class="stat-num">💡</div><div class="stat-label">Semantic Domain</div></div>
    </div>
  </div>
  <div class="cta">
    <button class="primary" onclick="openModal()">Send Inquiry</button>
    <button class="ghost" onclick="callNow()">Call</button>
  </div>
</section>

<div class="modal" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>Contact Us</h3>
    <div id="form-fields">
      <input id="inp-name" placeholder="Name *" />
      <input id="inp-email" placeholder="Email *" type="email" />
      <input id="inp-phone" placeholder="Phone" type="tel" />
      <textarea id="inp-msg" placeholder="Message *"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendEmail()">Send →</button>
    </div>
    <div class="success-msg" id="success-msg">
      <div class="check">✅</div>
      <p>Message sent successfully!<br>We'll get back to you soon.</p>
    </div>
  </div>
</div>

<script>
(function(){ emailjs.init("QrJxsuW2YuixK4Jnd"); })();
function callNow() { window.location.href = "tel:+201276919466"; }

function sendEmail() {
  var name  = document.getElementById("inp-name").value.trim();
  var email = document.getElementById("inp-email").value.trim();
  var phone = document.getElementById("inp-phone").value.trim();
  var msg   = document.getElementById("inp-msg").value.trim();
  ["inp-name","inp-email","inp-phone","inp-msg"].forEach(function(id){ document.getElementById(id).classList.remove("error"); });
  var valid = true;
  if (!name)  { document.getElementById("inp-name").classList.add("error"); valid = false; }
  var validEmail = email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if (email && !validEmail) { document.getElementById("inp-email").classList.add("error"); valid = false; }
  if (!email && !phone) { document.getElementById("inp-email").classList.add("error"); document.getElementById("inp-phone").classList.add("error"); valid = false; }
  if (!msg)   { document.getElementById("inp-msg").classList.add("error"); valid = false; }
  if (!valid) return;
  var btn = document.getElementById("send-btn"); btn.disabled = true; btn.textContent = "Sending...";
  emailjs.send("service_n2lmlwb", "template_hrz0r6o", { name:name, email:email, phone:phone, message:msg })
    .then(function() { document.getElementById("form-fields").style.display="none"; document.getElementById("success-msg").style.display="block"; setTimeout(closeModal,2500); },
          function(error){ btn.disabled=false; btn.textContent="Send →"; alert("Failed to send ❌ Please try again."); console.log(error); });
}

function openModal() {
  ["inp-name","inp-email","inp-phone","inp-msg"].forEach(function(id){ var el=document.getElementById(id); el.value=""; el.classList.remove("error"); });
  document.getElementById("form-fields").style.display="block"; document.getElementById("success-msg").style.display="none";
  var btn=document.getElementById("send-btn"); btn.disabled=false; btn.textContent="Send →";
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal')) closeModal(); }

document.querySelectorAll('.stat-num').forEach(function(el){
  var target=el.getAttribute('data-target'); if(!target) return;
  var count=0, speed=target/40;
  var interval=setInterval(function(){ count+=speed; if(count>=target){el.innerText=target;clearInterval(interval);}else{el.innerText=Math.floor(count);} },20);
});
</script>
</body>
</html>
