<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolf.Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --crimson:   #e03d5a;
    --violet:    #8b47d9;
    --rose:      #f06292;
    --glow:      rgba(139, 71, 217, 0.35);
    --glow-r:    rgba(224, 61, 90, 0.35);
    --bg:        #080710;
    --surface:   rgba(255,255,255,0.04);
    --border:    rgba(255,255,255,0.08);
    --text:      #f0eaf8;
    --muted:     #8a82a0;
    --accent:    #c97ef5;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    cursor: default;
  }

  /* ── Noise Overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.6;
  }

  /* ── Ambient Blobs ── */
  .blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.18;
    animation: drift linear infinite;
  }
  .blob-1 { width: 700px; height: 700px; background: var(--violet); top: -20%; left: -15%; animation-duration: 28s; animation-direction: alternate; }
  .blob-2 { width: 500px; height: 500px; background: var(--crimson); bottom: -10%; right: -10%; animation-duration: 22s; animation-direction: alternate-reverse; }
  .blob-3 { width: 350px; height: 350px; background: var(--rose); top: 40%; left: 55%; animation-duration: 18s; animation-direction: alternate; }
  @keyframes drift { from { transform: translate(0, 0) scale(1); } to { transform: translate(40px, 30px) scale(1.08); } }

  /* ── Page Wrapper ── */
  .page { position: relative; z-index: 1; }

  /* ── HERO ── */
  .hero {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
    text-align: center;
    position: relative;
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid rgba(139,71,217,0.4);
    background: rgba(139,71,217,0.1);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
    opacity: 0;
    animation: rise 0.8s 0.1s ease forwards;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);} }

  /* Wolf Icon */
  .wolf { font-size: clamp(3.5rem, 12vw, 6.5rem); line-height: 1; margin-bottom: 20px; opacity: 0; animation: rise 0.8s 0.25s ease forwards; filter: drop-shadow(0 0 30px rgba(139,71,217,0.6)); }

  /* Headline */
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 18vw, 11rem); letter-spacing: 0.04em; line-height: 0.9;
    background: linear-gradient(135deg, #f5d0fe 0%, #e879f9 30%, #8b47d9 60%, #e03d5a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; animation: rise 0.9s 0.4s ease forwards; position: relative;
  }
  .tld { display: block; font-size: 0.42em; letter-spacing: 0.22em; background: linear-gradient(135deg, #8b47d9, #e03d5a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-top: 0.05em; }

  /* CTA Buttons */
  .cta-group { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 40px; opacity: 0; animation: rise 0.9s 0.7s ease forwards; }
  .btn { display: inline-flex; align-items: center; gap: 9px; padding: 14px 32px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.95rem; text-decoration: none; border: none; cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease; white-space: nowrap; }
  .btn:hover { transform: translateY(-3px); }
  .btn-primary { background: linear-gradient(135deg, #8b47d9, #e03d5a); color: #fff; box-shadow: 0 0 0 0 var(--glow); }
  .btn-primary:hover { box-shadow: 0 12px 48px rgba(139,71,217,0.5); }
  .btn-ghost { background: var(--surface); color: var(--accent); border: 1px solid rgba(139,71,217,0.35); backdrop-filter: blur(8px); }
  .btn-ghost:hover { background: rgba(139,71,217,0.12); border-color: var(--accent); box-shadow: 0 8px 32px rgba(139,71,217,0.2); }

  /* ── STATS WITH FLASH ── */
  .stats { padding: 72px 24px; position: relative; }
  .stats-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; border-radius: 24px; overflow: hidden; }
  .stat {
    background: var(--bg);
    padding: 36px 20px;
    text-align: center;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
  }
  .stat::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(120deg, rgba(224,61,90,0.4), rgba(139,71,217,0.4), rgba(224,61,90,0.4));
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 0;
    pointer-events: none;
  }
  .stat:hover::before { opacity: 1; }
  .stat:hover { transform: translateY(-6px); box-shadow: 0 12px 24px rgba(139,71,217,0.5), 0 0 60px rgba(224,61,90,0.4); }
  .stat-num, .stat-label { position: relative; z-index: 1; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.4rem, 5vw, 3.2rem); letter-spacing: 0.04em; background: linear-gradient(135deg, var(--accent), var(--crimson)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 8px; }
  .stat-label { font-size: 0.8rem; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── FOOTER ── */
  footer { border-top: 1px solid var(--border); padding: 28px 24px; text-align: center; color: var(--muted); font-size: 0.85rem; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ── ANIMATIONS ── */
  @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) { .stats-inner { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .stats-inner { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<!-- Ambient blobs -->
<div class="blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="page">

  <!-- ── HERO ── -->
  <section class="hero">
    <div class="badge"><span class="badge-dot"></span> Premium Domain For Sale</div>

    <div class="wolf" aria-hidden="true">🐺</div>

    <h1>
      WOLF
      <span class="tld">.BUSINESS</span>
    </h1>

    <!-- ── STATS WITH FLASH ── -->
    <section class="stats" aria-label="Domain at a glance">
      <div class="stats-inner reveal">
        <div class="stat">
          <div class="stat-num">4</div>
          <div class="stat-label">Letters Only</div>
        </div>
        <div class="stat">
          <div class="stat-num">1</div>
          <div class="stat-label">Syllable</div>
        </div>
        <div class="stat">
          <div class="stat-num">100%</div>
          <div class="stat-label">Dictionary Word</div>
        </div>
        <div class="stat">
          <div class="stat-num">💡</div>
          <div class="stat-label">Semantically Clear</div>
        </div>
      </div>
    </section>

    <!-- CTA Buttons -->
    <div class="cta-group">
      <button class="btn btn-primary" onclick="openModal()">✉️ Send an Inquiry</button>
      <a class="btn btn-ghost" href="tel:+201276919466">📞 Call Direct</a>
      <a class="btn btn-ghost" href="https://wa.me/201276919466?text=I%27m%20interested%20in%20wolf.business" target="_blank" rel="noopener">💬 WhatsApp</a>
    </div>

  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <p>© 2026 WOLF.BUSINESS &nbsp;·&nbsp; Premium Domain &nbsp;·&nbsp;
       <a href="tel:+201276919466">+20 127 691 9466</a>
    </p>
  </footer>

</div><!-- /page -->

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Inquiry form">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    <h2>Express Interest</h2>
    <p class="modal-sub">Fill in your details and we'll be in touch promptly.</p>

    <form id="inquiryForm" onsubmit="handleSubmit(event)" novalidate>
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Smith" required>
      </div>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john@company.com" required>
      </div>
      <div class="field">
        <label for="phone">Phone (optional)</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000">
      </div>
      <div class="field">
        <label for="offer">Your Offer / Budget (optional)</label>
        <input type="text" id="offer" name="offer" placeholder="e.g. $25,000 or open to discussion">
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell us how you plan to use this domain…"></textarea>
      </div>
      <button type="submit" class="submit">Send Inquiry →</button>
    </form>
  </div>
</div>

<script>
  /* ── Modal ── */
  const overlay = document.getElementById('modalOverlay');
  function openModal()  { overlay.classList.add('open');  document.body.style.overflow = 'hidden'; }
  function closeModal() { overlay.classList.remove('open'); document.body.style.overflow = ''; }
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function handleSubmit(e) {
    e.preventDefault();
    const name  = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const offer = document.getElementById('offer').value;
    const msg   = document.getElementById('message').value;
    const body  = `Name: ${name}\nEmail: ${email}\nPhone: ${phone}\nOffer/Budget: ${offer}\n\nMessage:\n${msg}`;
    window.location.href = `mailto:abdullahaboulela@gmail.com?subject=${encodeURIComponent('Domain Inquiry — wolf.business from ' + name)}&body=${encodeURIComponent(body)}`;
    closeModal();
    e.target.reset();
  }

  /* ── Scroll Reveal ── */
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        const delay = entry.target.closest('.cards') ? Array.from(entry.target.parentElement.children).indexOf(entry.target) * 120 : 0;
        setTimeout(() => entry.target.classList.add('visible'), delay);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
